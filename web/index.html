<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Counsel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-950: oklch(12% 0.04 155);
    --green-900: oklch(16% 0.05 155);
    --green-800: oklch(22% 0.06 155);
    --green-700: oklch(30% 0.07 155);
    --green-600: oklch(40% 0.10 155);
    --green-500: oklch(50% 0.12 155);
    --green-400: oklch(63% 0.14 155);
    --green-300: oklch(75% 0.10 155);
    --cream-50: oklch(97% 0.01 85);
    --cream-100: oklch(95% 0.015 85);
    --cream-200: oklch(90% 0.02 85);
    --cream-300: oklch(82% 0.025 80);
    --cream-500: oklch(68% 0.03 80);
    --cream-700: oklch(52% 0.02 80);
    --amber-400: oklch(78% 0.13 75);
    --red-400: oklch(65% 0.18 25);
    --blue-500: oklch(60% 0.12 250);
    --bg: var(--green-950);
    --surface: var(--green-900);
    --border: oklch(20% 0.04 155);
    --text: var(--cream-100);
    --text-dim: var(--cream-500);
    --text-muted: var(--cream-700);
    --accent: var(--green-400);
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Outfit', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .bg-layer svg {
    width: 100%;
    height: 100%;
  }
  /* Topo lines — subtle drift */
  .topo-group {
    animation: topoDrift 60s linear infinite;
  }
  @keyframes topoDrift {
    0% { transform: translate(0, 0); }
    50% { transform: translate(-15px, 8px); }
    100% { transform: translate(0, 0); }
  }
  /* Floating orbs — slow ambient movement */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: oklch(25% 0.08 155);
    top: -10%; left: 20%;
    animation-delay: 0s;
    animation-duration: 25s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: oklch(20% 0.06 155);
    bottom: 5%; right: 10%;
    animation-delay: -8s;
    animation-duration: 30s;
  }
  .orb-3 {
    width: 350px; height: 350px;
    background: oklch(22% 0.05 80);
    top: 40%; left: -5%;
    animation-delay: -15s;
    animation-duration: 35s;
  }
  @keyframes orbFloat {
    0%, 100% { opacity: 0.4; transform: translate(0, 0) scale(1); }
    25% { opacity: 0.6; transform: translate(30px, -20px) scale(1.05); }
    50% { opacity: 0.5; transform: translate(-15px, 25px) scale(0.95); }
    75% { opacity: 0.65; transform: translate(20px, 10px) scale(1.02); }
  }
  /* Scan line — war room feel */
  .scan-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, oklch(63% 0.14 155 / 0.15), transparent);
    animation: scanMove 8s ease-in-out infinite;
  }
  @keyframes scanMove {
    0% { top: -2%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 102%; opacity: 0; }
  }
  /* Grid dots — subtle data texture */
  .grid-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(oklch(30% 0.05 155) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.12;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem 4rem;
    transition: min-height 500ms var(--ease-out-expo);
  }
  .hero.compact {
    min-height: auto;
    padding: 2.5rem 2rem 2rem;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.25rem;
    opacity: 0;
    animation: fadeUp 600ms 200ms var(--ease-out-expo) forwards;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 600;
    line-height: 1.1;
    text-align: center;
    color: var(--cream-50);
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 600ms 350ms var(--ease-out-expo) forwards;
  }
  .hero-subtitle {
    font-size: clamp(1rem, 2vw, 1.15rem);
    font-weight: 300;
    color: var(--cream-500);
    text-align: center;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 600ms 500ms var(--ease-out-expo) forwards;
  }
  .hero.compact .hero-title { font-size: clamp(1.8rem, 3vw, 2.2rem); margin-bottom: 0.4rem; }
  .hero.compact .hero-subtitle { display: none; }
  .hero.compact .hero-eyebrow { margin-bottom: 0.75rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== SEARCH BOX ===== */
  .search-wrap {
    width: 100%;
    max-width: 860px;
    opacity: 0;
    animation: fadeUp 600ms 650ms var(--ease-out-expo) forwards;
  }
  .search-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 200ms, box-shadow 200ms;
  }
  .search-box:focus-within {
    border-color: var(--green-600);
    box-shadow: 0 0 0 3px oklch(40% 0.10 155 / 0.15);
  }
  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.05rem;
    line-height: 1.6;
    padding: 1.1rem 1.25rem;
    padding-right: 7rem;
    min-height: 60px;
    resize: none;
    outline: none;
  }
  .search-input::placeholder { color: var(--cream-700); }
  .search-controls {
    position: absolute;
    right: 0.75rem;
    bottom: 0.65rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .panel-select {
    background: var(--green-800);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--cream-300);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 0.35rem 0.5rem;
    cursor: pointer;
    appearance: none;
    outline: none;
  }
  .panel-select:focus { border-color: var(--green-600); }
  .search-btn {
    background: var(--green-600);
    color: var(--cream-50);
    border: none;
    border-radius: 4px;
    padding: 0.45rem 1rem;
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 150ms;
  }
  .search-btn:hover { background: var(--green-500); }
  .search-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== CATEGORY CARDS ===== */
  .categories {
    width: 100%;
    max-width: 860px;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 600ms 800ms var(--ease-out-expo) forwards;
  }
  .categories.hidden { display: none; }
  .cat-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
    gap: 0.75rem;
  }
  .cat-card {
    position: relative;
    background: oklch(14% 0.035 155 / 0.7);
    backdrop-filter: blur(4px);
    border: 1px solid oklch(24% 0.04 155 / 0.6);
    border-radius: 6px;
    padding: 1.25rem 1.2rem 1.1rem;
    cursor: pointer;
    transition: border-color 250ms var(--ease-out-quart),
                transform 200ms var(--ease-out-quart),
                background 250ms var(--ease-out-quart),
                box-shadow 250ms var(--ease-out-quart);
  }
  .cat-card:hover {
    border-color: var(--green-500);
    background: oklch(17% 0.05 155 / 0.8);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px oklch(12% 0.04 155 / 0.4);
  }
  .cat-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, oklch(63% 0.10 155 / 0.2), transparent);
    opacity: 0;
    transition: opacity 250ms;
  }
  .cat-card:hover::after { opacity: 1; }
  .cat-icon {
    width: 22px;
    height: 22px;
    margin-bottom: 0.7rem;
    display: block;
    color: var(--green-400);
    opacity: 0.8;
  }
  .cat-card:hover .cat-icon,
  .chain-card:hover .cat-icon { opacity: 1; }
  .cat-name {
    font-family: var(--font-body);
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--cream-100);
    margin-bottom: 0.3rem;
    letter-spacing: 0.01em;
  }
  .cat-desc {
    font-size: 0.72rem;
    color: var(--cream-700);
    line-height: 1.5;
    font-weight: 300;
  }
  .cat-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.48rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    background: oklch(40% 0.10 155 / 0.5);
    color: var(--green-300);
    padding: 0.12rem 0.4rem;
    border-radius: 2px;
    margin-left: 0.5rem;
    vertical-align: middle;
    border: 1px solid oklch(40% 0.08 155 / 0.3);
  }

  /* Chain cards — distinct from regular cards */
  .chain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
  }
  .chain-card {
    position: relative;
    background: oklch(16% 0.05 155 / 0.6);
    backdrop-filter: blur(4px);
    border: 1px solid oklch(40% 0.08 155 / 0.35);
    border-radius: 6px;
    padding: 1.35rem 1.2rem 1.15rem;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 250ms var(--ease-out-quart),
                transform 200ms var(--ease-out-quart),
                box-shadow 250ms var(--ease-out-quart);
  }
  .chain-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green-600), var(--green-400), var(--green-600));
    opacity: 0.6;
  }
  .chain-card:hover {
    border-color: var(--green-400);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px oklch(12% 0.04 155 / 0.5), 0 0 20px oklch(40% 0.10 155 / 0.08);
  }
  .chain-card .cat-icon { width: 24px; height: 24px; margin-bottom: 0.7rem; }
  .chain-card .cat-name {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--cream-50);
  }
  .chain-card .cat-desc {
    font-size: 0.72rem;
    color: var(--cream-500);
    line-height: 1.5;
    font-weight: 300;
  }
  .chain-card .chain-steps {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.25rem 0.3rem;
    margin-top: 0.7rem;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--green-300);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }
  .chain-card .chain-steps .arrow {
    color: var(--cream-700);
    font-size: 0.55rem;
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    position: relative;
    z-index: 1;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.6rem 2rem;
    background: var(--green-900);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .status-bar.visible { display: flex; }
  .status-dot-sm {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .convergence-inline {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .conv-track-sm {
    width: 100px;
    height: 3px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .conv-fill-sm {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 500ms var(--ease-out-expo);
    border-radius: 1px;
  }

  /* ===== DEBATE FEED ===== */
  .debate-section {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
    display: none;
  }
  .debate-section.visible { display: block; }
  .response-entry {
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(12px);
    animation: entryReveal 450ms var(--ease-out-expo) forwards;
  }
  @keyframes entryReveal { to { opacity: 1; transform: translateY(0); } }
  .response-meta {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 0.4rem;
  }
  .response-who {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--cream-100);
  }
  .response-round {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .response-text {
    font-size: 0.88rem;
    line-height: 1.8;
    color: var(--cream-300);
    max-width: 62ch;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
  }
  .response-rule {
    width: 36px;
    height: 1px;
    background: var(--border);
    margin-top: 2rem;
  }

  /* ===== RESULTS ===== */
  .results-section {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 2rem 5rem;
    display: none;
  }
  .results-section.visible { display: block; animation: entryReveal 500ms var(--ease-out-expo) forwards; }
  .results-divider {
    width: 60px;
    height: 2px;
    background: var(--green-600);
    margin-bottom: 2rem;
  }
  .results-title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--cream-100);
    margin-bottom: 1.5rem;
  }
  .verdict-strip {
    display: flex;
    gap: 2.5rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .verdict-item { }
  .verdict-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
  }
  .verdict-val { font-size: 1rem; font-weight: 600; }
  .v-approve { color: var(--accent); }
  .v-changes { color: var(--red-400); }
  .v-notes { color: var(--amber-400); }
  .exec-text {
    font-size: 0.92rem;
    line-height: 1.85;
    color: var(--cream-300);
    max-width: 58ch;
    margin-bottom: 2.5rem;
  }
  .findings-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .findings-tbl th {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--green-700);
  }
  .findings-tbl td {
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--border);
    color: var(--cream-300);
    vertical-align: top;
  }
  .sev-critical { color: var(--red-400); font-weight: 600; }
  .sev-high { color: var(--amber-400); font-weight: 600; }
  .sev-medium { color: var(--blue-500); }
  .sev-low { color: var(--text-muted); }

  /* ===== FOOTER ===== */
  .footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  @media (max-width: 600px) {
    .cat-grid { grid-template-columns: repeat(2, 1fr); }
    .hero { padding: 2rem 1.25rem 3rem; }
    .verdict-strip { flex-wrap: wrap; gap: 1.5rem; }
  }
</style>
</head>
<body>

<!-- Animated layered background -->
<div class="bg-layer">
  <!-- Grid dots texture -->
  <div class="grid-dots"></div>
  <!-- Floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <!-- Scanning line -->
  <div class="scan-line"></div>
  <!-- Topo contour lines -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
    <defs><style>.tl { fill: none; stroke: oklch(50% 0.10 155); stroke-width: 0.6; opacity: 0.08; }</style></defs>
    <g class="topo-group">
      <path class="tl" d="M-50,180 Q150,160 300,200 T600,170 T900,210 T1050,180"/>
      <path class="tl" d="M-50,230 Q200,200 350,250 T650,215 T950,260 T1050,230"/>
      <path class="tl" d="M-50,290 Q180,260 320,310 T620,275 T920,320 T1050,290"/>
      <path class="tl" d="M-50,360 Q210,330 380,380 T680,345 T980,390 T1050,360"/>
      <path class="tl" d="M-50,440 Q170,410 340,460 T640,425 T940,470 T1050,440"/>
      <path class="tl" d="M-50,520 Q220,490 390,540 T690,505 T990,550 T1050,520"/>
      <path class="tl" d="M-50,600 Q190,570 350,620 T650,585 T950,630 T1050,600"/>
      <path class="tl" d="M-50,680 Q230,650 400,700 T700,665 T1000,710 T1050,680"/>
      <path class="tl" d="M-50,760 Q200,730 370,780 T670,745 T970,790 T1050,760"/>
      <path class="tl" d="M-50,840 Q240,810 410,860 T710,825 T1010,870 T1050,840"/>
      <ellipse class="tl" cx="500" cy="480" rx="300" ry="190" transform="rotate(-6 500 480)"/>
      <ellipse class="tl" cx="500" cy="480" rx="230" ry="145" transform="rotate(-6 500 480)"/>
      <ellipse class="tl" cx="500" cy="480" rx="160" ry="100" transform="rotate(-6 500 480)"/>
      <ellipse class="tl" cx="500" cy="480" rx="90" ry="55" transform="rotate(-6 500 480)"/>
      <ellipse class="tl" cx="280" cy="280" rx="140" ry="85" transform="rotate(12 280 280)"/>
      <ellipse class="tl" cx="280" cy="280" rx="80" ry="48" transform="rotate(12 280 280)"/>
      <ellipse class="tl" cx="770" cy="720" rx="170" ry="105" transform="rotate(-10 770 720)"/>
      <ellipse class="tl" cx="770" cy="720" rx="100" ry="60" transform="rotate(-10 770 720)"/>
    </g>
  </svg>
</div>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-eyebrow">Multi-Model Deliberation</div>
  <h1 class="hero-title">AI Counsel</h1>
  <p class="hero-subtitle">Pose a question. A council of AI models will debate, challenge each other, and converge on a recommendation.</p>

  <div class="search-wrap">
    <div class="search-box">
      <textarea class="search-input" id="question" rows="1" placeholder="Ask the council anything..." oninput="autoResize(this)"></textarea>
      <div class="search-controls">
        <select class="panel-select" id="panel"></select>
        <button class="search-btn" id="startBtn" onclick="startDeliberation()">Deliberate</button>
      </div>
    </div>
  </div>

  <div class="categories" id="categories">
    <div id="catSections"></div>
  </div>
</section>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar">
  <div class="status-dot-sm"></div>
  <span id="statusText">Deliberating</span>
  <div class="convergence-inline">
    <div class="conv-track-sm"><div class="conv-fill-sm" id="convFill"></div></div>
    <span id="convLabel">0%</span>
  </div>
  <span id="modelCount"></span>
</div>

function renderCategories() {
  const container = document.getElementById('catSections');

  SECTIONS.forEach(section => {
    const wrapper = document.createElement('div');
    wrapper.style.marginBottom = '2.5rem';

    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = section.label;
    wrapper.appendChild(label);

    const grid = document.createElement('div');
    grid.className = section.isChain ? 'chain-grid' : 'cat-grid';

    section.items.forEach(cat => {
      const card = document.createElement('div');

      if (cat.badge) {
        card.className = 'chain-card';
        const steps = cat.desc.split('\u2192').map(s => s.trim());
        const stepsHtml = steps.map((s, i) =>
          i < steps.length - 1 ? `<span>${s}</span><span class="arrow">\u2192</span>` : `<span>${s}</span>`
        ).join('');
        card.innerHTML = `
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-desc">${cat.desc}</div>
          <div class="chain-steps">${stepsHtml}</div>
        `;
      } else {
        card.className = 'cat-card';
        card.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div>`;
      }

      card.onclick = () => {
        document.getElementById('question').value = cat.question;
        if (cat.panel) {
          const sel = document.getElementById('panel');
          for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === cat.panel) { sel.selectedIndex = i; break; }
          }
        }
        autoResize(document.getElementById('question'));
        document.getElementById('question').focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      grid.appendChild(card);
    });

    wrapper.appendChild(grid);
    container.appendChild(wrapper);
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(60, el.scrollHeight) + 'px';
}

async function loadPanels() {
  try {
    const resp = await fetch('/api/panels');
    const panels = await resp.json();
    const sel = document.getElementById('panel');
    for (const [name] of Object.entries(panels)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    }
  } catch(e) {}
}

function startDeliberation() {
  const question = document.getElementById('question').value;
  const panel = document.getElementById('panel').value;
  if (!question.trim()) return;

  // Compact hero
  document.getElementById('hero').classList.add('compact');
  document.getElementById('categories').classList.add('hidden');
  document.getElementById('statusBar').classList.add('visible');
  document.getElementById('debateSection').classList.add('visible');
  document.getElementById('debateSection').innerHTML = '';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('convFill').style.width = '0%';
  document.getElementById('convLabel').textContent = '0%';
  document.getElementById('startBtn').disabled = true;

  const body = JSON.stringify({ question, panel, rounds: 2, working_directory: '.' });

  fetch('/api/deliberate/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body,
  }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { onComplete(); return; }
        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split('\n\n');
        buffer = events.pop();
        for (const block of events) {
          const lines = block.split('\n');
          let type = '', data = '';
          for (const ln of lines) {
            if (ln.startsWith('event: ')) type = ln.slice(7);
            else if (ln.startsWith('data: ')) data = ln.slice(6);
          }
          if (type && data) { try { handleEvent(type, JSON.parse(data)); } catch(e) {} }
        }
        read();
      });
    }
    read();
  }).catch(() => onComplete());
}

function handleEvent(type, data) {
  switch(type) {
    case 'status':
      if (data.participants) document.getElementById('modelCount').textContent = data.participants.length + ' models';
      break;
    case 'response': addResponse(data); break;
    case 'convergence':
      const pct = Math.round(data.similarity * 100);
      document.getElementById('convFill').style.width = pct + '%';
      document.getElementById('convLabel').textContent = pct + '% ' + data.status;
      break;
    case 'summary': showSummary(data); break;
    case 'findings': showFindings(data); break;
    case 'complete':
      document.getElementById('statusText').textContent = 'Complete \u00b7 ' + data.rounds_completed + ' rounds';
      onComplete();
      break;
    case 'error':
      document.getElementById('statusText').textContent = 'Error';
      onComplete();
      break;
  }
}

function addResponse(data) {
  const section = document.getElementById('debateSection');
  const entry = document.createElement('div');
  entry.className = 'response-entry';
  entry.innerHTML = `
    <div class="response-meta">
      <span class="response-who">${esc(data.participant)}</span>
      <span class="response-round">Round ${data.round}</span>
    </div>
    <div class="response-text">${esc(data.response)}</div>
    <div class="response-rule"></div>
  `;
  section.appendChild(entry);
  entry.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showSummary(data) {
  const sec = document.getElementById('resultsSection');
  sec.style.display = 'block';
  sec.classList.add('visible');
  if (data.executive_summary) {
    const el = document.getElementById('execText');
    el.style.display = 'block';
    el.textContent = data.executive_summary;
  }
}

function showFindings(data) {
  const sec = document.getElementById('resultsSection');
  sec.style.display = 'block';
  sec.classList.add('visible');
  document.getElementById('verdictStrip').style.display = 'flex';

  const vv = document.getElementById('vVerdict');
  vv.textContent = data.verdict;
  vv.className = 'verdict-val ' + (data.verdict === 'APPROVE' ? 'v-approve' : data.verdict === 'REQUEST_CHANGES' ? 'v-changes' : 'v-notes');
  document.getElementById('vRisk').textContent = data.risk_level;
  document.getElementById('vCount').textContent = data.findings_count;

  if (data.findings && data.findings.length) {
    document.getElementById('findingsTbl').style.display = 'table';
    const tbody = document.getElementById('findingsBody');
    tbody.innerHTML = '';
    data.findings.forEach((f, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td class="sev-${f.severity}">${f.severity}</td><td>${f.category}</td><td>${esc(f.description)}</td>`;
      tbody.appendChild(tr);
    });
  }
}

function onComplete() {
  document.getElementById('statusBar').querySelector('.status-dot-sm').style.animationPlayState = 'paused';
  document.getElementById('startBtn').disabled = false;
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

renderCategories();
loadPanels();
</script>
